name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-apple-silicon:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Collect DMG asset
        run: |
          mkdir -p release-assets
          dmg_path=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" -type f | head -n 1)
          if [ -z "$dmg_path" ]; then
            echo "DMG file not found"
            exit 1
          fi
          cp "$dmg_path" release-assets/XClaw-macOS-Apple-Silicon.dmg

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: XClaw ${{ github.ref_name }}
          body: |
            ## 更新内容
            - 本版本已完成构建并提供 macOS 安装包。
            - 如需补充更详细的功能更新、修复说明和已知问题，可在 GitHub Release 页面手动编辑本说明。

            ## 安装说明
            - `XClaw-macOS-Apple-Silicon.dmg`：适用于 Apple Silicon（M1 / M2 / M3 / M4）

            ## Intel 版本
            - Intel Mac 安装包不再默认随每次发版自动生成。
            - 如有需要，可单独手动触发 Intel 构建流程。

            ## 说明
            - 首次安装如遇到 macOS 安全提示，请在系统设置中允许打开应用。
          files: release-assets/XClaw-macOS-Apple-Silicon.dmg
